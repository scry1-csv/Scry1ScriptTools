name: Release

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'リリースノート（変更内容を記述してください）'
        required: true
        type: string

jobs:
  release:
    runs-on: windows-latest

    steps:
      # リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # .NET 10 SDK をセットアップ
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Core を先にビルド（依存関係の解決を保証）
      - name: Build Core
        run: >
          dotnet build Core/Core.csproj
          -c Release

      # SexToyScriptConverter をパブリッシュ
      - name: Publish SexToyScriptConverter
        run: >
          dotnet publish SexToyScriptConverter/SexToyScriptConverter.csproj
          /p:PublishProfile=FolderProfile

      # SexToyScriptViewer をパブリッシュ
      - name: Publish SexToyScriptViewer
        run: >
          dotnet publish SexToyScriptViewer/SexToyScriptViewer.csproj
          /p:PublishProfile=FolderProfile

      # リリース日付タグを生成（JST: UTC+9）
      - name: Generate release tag
        id: tag
        shell: pwsh
        run: |
          # JST (UTC+9) で当日の日付を取得してタグを生成
          $date = [System.TimeZoneInfo]::ConvertTimeBySystemTimeZoneId(
            [DateTime]::UtcNow, 'Tokyo Standard Time'
          ).ToString('yyyy-MM-dd')
          $tag = "v$date"
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          echo "DATE=$date" >> $env:GITHUB_OUTPUT
          echo "生成されたタグ: $tag"

      # README.md のバージョン履歴を更新
      - name: Update README version history
        shell: pwsh
        run: |
          $date = "${{ steps.tag.outputs.DATE }}"
          $notes = "${{ github.event.inputs.release_notes }}"
          $entry = "$date $notes"

          $readme = Get-Content -Path "README.md" -Raw
          # 「## バージョン履歴」の直後の空行の後に新しいエントリを挿入
          $readme = $readme -replace '(## バージョン履歴\r?\n\r?\n)', "`$1$entry`r`n"
          Set-Content -Path "README.md" -Value $readme -NoNewline
          echo "README.md にバージョン履歴を追加: $entry"

      # README.md の変更をコミットしてプッシュ
      - name: Commit README update
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update version history for ${{ steps.tag.outputs.TAG }}"
          git push

      # ZIPアーカイブを作成
      - name: Create release zip
        id: zip
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.TAG }}"
          $zipName = "Scry1ScriptTools-$tag.zip"

          # README.md を README.txt としてコピー
          Copy-Item -Path "README.md" -Destination "README.txt"

          # ZIPに含めるファイルをまとめる
          $files = @(
            "SexToyScriptConverter/publish/SexToyScriptConverter.exe",
            "SexToyScriptViewer/publish/SexToyScriptViewer.exe",
            "README.txt",
            "LICENSE.txt",
            "ThirdPartyNotices.txt"
          )

          Compress-Archive -Path $files -DestinationPath $zipName -Force
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_OUTPUT
          echo "作成されたZIPファイル: $zipName"

      # GitHub Releaseを作成してZIPを添付
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: ${{ steps.tag.outputs.TAG }}
          body: ${{ github.event.inputs.release_notes }}
          files: ${{ steps.zip.outputs.ZIP_NAME }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
